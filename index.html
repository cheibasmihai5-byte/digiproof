<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feedback DigiProf</title>
  <style>
    :root {
      color-scheme: light;
      --primary: #3f51b5;
      --accent: #00897b;
      --accent-dark: #00695c;
      --bg: #f4f7fb;
      --text: #253047;
      --muted: #667085;
      --border: #d7deea;
      --surface: #ffffff;
      --danger: #b42318;
      --success: #087443;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      display: flex;
      justify-content: flex-end;
      padding: 12px clamp(16px, 4vw, 40px);
      background: rgba(255, 255, 255, 0.92);
      border-bottom: 1px solid rgba(215, 222, 234, 0.8);
      backdrop-filter: blur(8px);
    }

    .admin-link {
      min-height: 44px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px 18px;
      border-radius: 8px;
      border: 1px solid var(--border);
      text-decoration: none;
      color: var(--primary);
      font-weight: 700;
      background: white;
      transition: transform 0.2s ease, border-color 0.2s ease;
    }

    .admin-link:hover {
      transform: translateY(-1px);
      border-color: var(--primary);
    }

    header {
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: white;
      text-align: center;
      padding: 42px 20px;
    }

    header h1 {
      margin: 0;
      font-size: clamp(30px, 5vw, 42px);
      letter-spacing: 0;
    }

    header p {
      max-width: 720px;
      margin: 12px auto 0;
      font-size: 18px;
      line-height: 1.5;
    }

    .container {
      width: min(92%, 900px);
      margin: 30px auto;
    }

    .card {
      background: var(--surface);
      padding: clamp(20px, 4vw, 32px);
      border: 1px solid #edf1f7;
      border-radius: 8px;
      box-shadow: 0 8px 22px rgba(37, 48, 71, 0.08);
    }

    h2 {
      color: var(--primary);
      margin: 0 0 22px;
      font-size: 26px;
      letter-spacing: 0;
    }

    .form-group {
      margin-bottom: 24px;
    }

    label,
    legend {
      display: block;
      margin-bottom: 8px;
      font-weight: 700;
    }

    fieldset {
      padding: 0;
      margin: 0 0 24px;
      border: 0;
    }

    input[type="text"],
    input[type="email"],
    select,
    textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 16px;
      color: var(--text);
      background: white;
    }

    input:focus,
    select:focus,
    textarea:focus {
      outline: 3px solid rgba(63, 81, 181, 0.16);
      border-color: var(--primary);
    }

    textarea {
      resize: vertical;
      min-height: 120px;
    }

    .choice-list {
      display: grid;
      gap: 9px;
      margin-top: 10px;
    }

    .choice-list label {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      margin: 0;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-weight: 400;
      cursor: pointer;
    }

    .choice-list input {
      margin-top: 2px;
      accent-color: var(--primary);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      margin-top: 24px;
    }

    button {
      min-height: 44px;
      border: 0;
      padding: 12px 18px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      background: var(--accent);
      color: white;
      transition: background 0.2s ease, transform 0.2s ease;
    }

    button:hover {
      background: var(--accent-dark);
      transform: translateY(-1px);
    }

    button:disabled {
      cursor: wait;
      opacity: 0.72;
      transform: none;
    }

    .status {
      min-height: 24px;
      margin: 0;
      color: var(--muted);
      font-weight: 700;
    }

    .status.success {
      color: var(--success);
    }

    .status.error {
      color: var(--danger);
    }

    .footer {
      text-align: center;
      margin: 30px 0;
      color: var(--muted);
    }

    @media (max-width: 640px) {
      .topbar {
        justify-content: stretch;
      }

      .admin-link,
      .actions button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <nav class="topbar" aria-label="Administrare">
    <a class="admin-link" href="/admin.html">Login admin</a>
  </nav>

  <header>
    <h1>Feedback deschis - DigiProf</h1>
    <p>Formular pentru evaluarea cursului si reflectia participantilor</p>
  </header>

  <main class="container">
    <section class="card" aria-labelledby="form-title">
      <h2 id="form-title">Formular de feedback</h2>

      <form id="feedback-form">
        <div class="form-group">
          <label for="name">Nume si prenume</label>
          <input id="name" name="nume" type="text" placeholder="Introduceti numele" required>
        </div>

        <div class="form-group">
          <label for="username">Username participant</label>
          <input id="username" name="username" type="text" placeholder="Introduceti username-ul, daca exista">
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" placeholder="Introduceti adresa de email" required>
        </div>

        <fieldset>
          <legend>Cum apreciati cursul DigiProf?</legend>
          <div class="choice-list">
            <label><input type="radio" name="evaluare" value="Foarte bun" required> Foarte bun</label>
            <label><input type="radio" name="evaluare" value="Bun"> Bun</label>
            <label><input type="radio" name="evaluare" value="Satisfacator"> Satisfacator</label>
            <label><input type="radio" name="evaluare" value="Necesita imbunatatiri"> Necesita imbunatatiri</label>
          </div>
        </fieldset>

        <fieldset>
          <legend>Ce competente ati dezvoltat?</legend>
          <div class="choice-list">
            <label><input type="checkbox" name="competente" value="Utilizarea instrumentelor digitale"> Utilizarea instrumentelor digitale</label>
            <label><input type="checkbox" name="competente" value="Crearea resurselor interactive"> Crearea resurselor interactive</label>
            <label><input type="checkbox" name="competente" value="Evaluare digitala"> Evaluare digitala</label>
            <label><input type="checkbox" name="competente" value="Colaborare online"> Colaborare online</label>
            <label><input type="checkbox" name="competente" value="Siguranta digitala"> Siguranta digitala</label>
          </div>
        </fieldset>

        <div class="form-group">
          <label for="activity">Care activitate v-a fost cea mai utila?</label>
          <select id="activity" name="activitate_utila" required>
            <option value="">Alegeti o activitate</option>
            <option>Prezentari interactive</option>
            <option>Activitati practice</option>
            <option>Evaluari online</option>
            <option>Lucru colaborativ</option>
            <option>Crearea resurselor digitale</option>
          </select>
        </div>

        <div class="form-group">
          <label for="experience">Descrieti experienta dumneavoastra in cadrul cursului</label>
          <textarea id="experience" name="experienta" placeholder="Scrieti reflectia sau sugestiile dumneavoastra..." required></textarea>
        </div>

        <div class="actions">
          <button id="submit-button" type="submit">Trimite feedback</button>
          <p id="form-status" class="status" role="status" aria-live="polite"></p>
        </div>
      </form>
    </section>
  </main>

  <div class="footer">
    &copy; 2026 | Formular Feedback DigiProf
  </div>

  <script>
    const feedbackForm = document.querySelector("#feedback-form");
    const submitButton = document.querySelector("#submit-button");
    const formStatus = document.querySelector("#form-status");

    function setStatus(message, type) {
      formStatus.textContent = message;
      formStatus.className = `status ${type || ""}`.trim();
    }

    feedbackForm.addEventListener("submit", async (event) => {
      event.preventDefault();

      const formData = new FormData(feedbackForm);
      const payload = {
        nume: formData.get("nume"),
        username: formData.get("username"),
        email: formData.get("email"),
        evaluare: formData.get("evaluare"),
        competente: formData.getAll("competente"),
        activitate_utila: formData.get("activitate_utila"),
        experienta: formData.get("experienta")
      };

      submitButton.disabled = true;
      setStatus("Se trimite...", "");

      try {
        const response = await fetch("/api/submit", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(payload)
        });

        const result = await response.json().catch(() => ({}));

        if (!response.ok) {
          throw new Error(result.error || "Nu s-a putut trimite formularul.");
        }

        feedbackForm.reset();
        setStatus("Multumim! Feedbackul a fost trimis.", "success");
      } catch (error) {
        setStatus(error.message, "error");
      } finally {
        submitButton.disabled = false;
      }
    });
  </script>
</body>
</html>
